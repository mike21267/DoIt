<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>DoIt.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #252525;
  --border2: #303030;
  --text: #f0ede6;
  --text2: #777;
  --muted: #444;
  --accent: #c8f135;
  --red: #ff4422;
  --orange: #ff9500;
  --blue: #4da6ff;
  --green: #00c97a;
  --radius: 14px;
  --radius-sm: 8px;
}

[data-theme="light"] {
  --bg: #f5f4ef;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e5e3db;
  --border2: #d8d6ce;
  --text: #111111;
  --text2: #777777;
  --muted: #bbbbbb;
}

html { -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Fragment Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 640px;
  margin: 0 auto;
  padding-bottom: 80px;
  transition: background .3s, color .3s;
}

/* HEADER */
header {
  padding: 32px 24px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 44px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
}
.brand-name em { font-style: normal; color: var(--accent); }

.brand-sub {
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 1px;
  margin-top: 6px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-top: 8px;
}

/* CUSTOM ICON BUTTONS */
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
  padding: 0;
}
.icon-btn:hover { border-color: var(--accent); }
.icon-btn.on { border-color: var(--green); background: rgba(0,201,122,0.08); }

/* SVG ICONS */
.icon-btn svg { width: 16px; height: 16px; }
.icon-bell svg { stroke: var(--text2); }
.icon-bell.on svg { stroke: var(--green); }
.icon-theme svg { stroke: var(--text2); }

.rule { height: 1px; background: var(--border); margin: 24px 24px 0; }

/* FORM */
.add-section { padding: 24px 24px 0; }

.form-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .2s;
}
.form-card:focus-within { border-color: rgba(200,241,53,0.35); }

.task-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'Fragment Mono', monospace;
  font-size: 15px;
  color: var(--text);
  line-height: 1.6;
  resize: none;
  padding: 18px 18px 0;
  min-height: 56px;
  max-height: 140px;
  -webkit-appearance: none;
}
.task-input::placeholder { color: var(--muted); }

.form-options {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  flex-wrap: wrap;
}

.opt-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-family: 'Fragment Mono', monospace;
  font-size: 11px;
  padding: 8px 10px;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
  appearance: none;
  -webkit-appearance: none;
  min-height: 36px;
}
.opt-select:focus { border-color: var(--accent); color: var(--text); }

.datetime-input {
  flex: 1;
  min-width: 160px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-family: 'Fragment Mono', monospace;
  font-size: 11px;
  padding: 8px 10px;
  outline: none;
  transition: border-color .2s;
  color-scheme: dark;
  min-height: 36px;
  -webkit-appearance: none;
}
[data-theme="light"] .datetime-input { color-scheme: light; }
.datetime-input:focus { border-color: var(--accent); color: var(--text); }

.form-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 14px;
  border-top: 1px solid var(--border);
  gap: 10px;
}

.time-preview { font-size: 11px; color: var(--accent); flex: 1; min-width: 0; }
.time-preview.dim { color: var(--muted); }

.add-btn {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius-sm);
  padding: 12px 20px;
  font-family: 'Fragment Mono', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .15s;
  font-weight: 500;
  flex-shrink: 0;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}
.add-btn:active { transform: scale(0.97); opacity: 0.9; }

/* TASKS */
.tasks-section { padding: 28px 24px 0; }
.done-section  { padding: 20px 24px 0; }

.section-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.section-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  display: flex; align-items: center; gap: 8px;
}

.count-pill {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 100px;
}

.text-btn {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer;
  font-family: 'Fragment Mono', monospace;
  transition: color .15s;
  min-height: 44px;
  padding: 0 4px;
}
.text-btn:hover { color: var(--red); }

.task-list { display: flex; flex-direction: column; }

/* TASK ROW */
.task-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px 0 16px 14px;
  border-bottom: 1px solid var(--border);
  animation: fadeIn .2s ease;
  transition: opacity .2s;
  position: relative;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.task-row:first-child { border-top: 1px solid var(--border); }
.task-row.done { opacity: 0.3; }
.task-row.done .task-title { text-decoration: line-through; }

.task-row::before {
  content: '';
  position: absolute;
  left: 0; top: 12px; bottom: 12px;
  width: 3px;
  border-radius: 2px;
  background: transparent;
  transition: background .2s;
}
.task-row.pri-high::before { background: var(--red); }
.task-row.pri-med::before  { background: var(--orange); }
.task-row.pri-low::before  { background: var(--blue); }

/* CHECKBOX */
.chk {
  width: 22px; height: 22px;
  border: 1.5px solid var(--border2);
  border-radius: 5px;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  min-width: 22px;
  -webkit-tap-highlight-color: transparent;
}
.chk:hover { border-color: var(--accent); }
.task-row.done .chk { background: var(--accent); border-color: var(--accent); }
.task-row.done .chk::after {
  content: '';
  width: 4px; height: 8px;
  border: 2px solid #000;
  border-top: none; border-left: none;
  transform: rotate(45deg) translate(-1px, -1px);
  display: block;
}

.task-body { flex: 1; min-width: 0; }

.task-title {
  font-size: 14px;
  line-height: 1.55;
  color: var(--text);
  word-break: break-word;
  margin-bottom: 6px;
}

.task-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.task-time {
  font-size: 11px;
  color: var(--text2);
}
.task-time.soon    { color: var(--orange); }
.task-time.overdue { color: var(--red); }
.task-time.fired   { color: var(--green); }

.badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 100px;
  white-space: nowrap;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
}
.badge-rec { color: var(--accent); border-color: rgba(200,241,53,0.35); }

.task-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}

.act-btn {
  background: none; border: none;
  color: var(--border2);
  cursor: pointer;
  font-size: 16px;
  width: 36px; height: 36px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.act-btn:active { background: var(--surface2); }
.act-btn.del:hover, .act-btn.del:active { color: var(--red); }
.act-btn.snz:hover, .act-btn.snz:active { color: var(--orange); }

/* EMPTY */
.empty-state {
  padding: 48px 0;
  text-align: center;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
.empty-glyph { font-size: 28px; color: var(--border2); }
.empty-text  { font-size: 13px; color: var(--muted); }
.empty-hint  { font-size: 11px; color: var(--border2); }

/* ALARM OVERLAY */
.alarm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.alarm-overlay.open { opacity: 1; pointer-events: all; }

.alarm-pulse {
  position: absolute; inset: 0;
  background: var(--accent);
  opacity: 0;
}
.alarm-overlay.open .alarm-pulse {
  animation: pulse-bg 1s ease-in-out infinite;
}
@keyframes pulse-bg {
  0%,100% { opacity: 0; }
  50%      { opacity: 0.06; }
}

.alarm-bell {
  margin-bottom: 24px;
}
.alarm-overlay.open .alarm-bell {
  animation: shake 0.6s ease-in-out infinite;
}
@keyframes shake {
  0%,100% { transform: rotate(0deg); }
  20%     { transform: rotate(-18deg); }
  40%     { transform: rotate(18deg); }
  60%     { transform: rotate(-12deg); }
  80%     { transform: rotate(12deg); }
}

.alarm-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}

.alarm-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px, 6vw, 40px);
  font-weight: 900;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
  max-width: 400px;
}

.alarm-time {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 48px;
  letter-spacing: 0.5px;
}

.alarm-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 280px;
}

.alarm-done {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius-sm);
  padding: 16px;
  font-family: 'Fragment Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  min-height: 52px;
  -webkit-tap-highlight-color: transparent;
}
.alarm-done:active { opacity: 0.85; }

.alarm-snooze-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.alarm-snooze-opt {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Fragment Mono', monospace;
  font-size: 12px;
  padding: 14px;
  cursor: pointer;
  text-align: center;
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
}
.alarm-snooze-opt:active { border-color: var(--orange); color: var(--orange); }

/* SNOOZE MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%; max-width: 300px;
  transform: translateY(10px);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700;
  margin-bottom: 4px;
}
.modal-task { font-size: 11px; color: var(--text2); margin-bottom: 20px; }

.snooze-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 12px;
}

.snooze-opt {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Fragment Mono', monospace;
  font-size: 12px;
  padding: 12px;
  cursor: pointer;
  text-align: center;
  min-height: 44px;
}
.snooze-opt:active { border-color: var(--orange); color: var(--orange); }

.modal-close {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-family: 'Fragment Mono', monospace;
  font-size: 12px; padding: 12px;
  cursor: pointer;
  min-height: 44px;
}
.modal-close:active { border-color: var(--red); color: var(--red); }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 12px; letter-spacing: 0.5px;
  padding: 11px 22px; border-radius: 100px;
  transition: transform .3s cubic-bezier(.34,1.4,.64,1);
  pointer-events: none; white-space: nowrap; z-index: 999;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.good { border-color: rgba(200,241,53,0.4); color: var(--accent); }
.toast.warn { border-color: rgba(255,149,0,0.4); color: var(--orange); }

/* FOOTER */
footer {
  position: fixed;
  bottom: 16px; right: 20px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  font-family: 'Fragment Mono', monospace;
  pointer-events: none;
  z-index: 50;
}

@media (max-width: 480px) {
  header { padding: 24px 18px 0; }
  .rule { margin: 20px 18px 0; }
  .add-section, .tasks-section, .done-section { padding-left: 18px; padding-right: 18px; }
  .brand-name { font-size: 36px; }
  .datetime-input { min-width: 0; width: 100%; }
  .form-options { gap: 6px; }
  .opt-select { font-size: 11px; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="brand-name">Do<em>It.</em></div>
    <div class="brand-sub" id="today-label"></div>
  </div>
  <div class="header-right">

    <!-- BELL ICON -->
    <button class="icon-btn icon-bell" id="bell-btn" onclick="handleNotif()" title="Enable reminders">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>

    <!-- THEME ICON -->
    <button class="icon-btn icon-theme" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">
      <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor">
        <!-- sun by default -->
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>

  </div>
</header>

<div class="rule"></div>

<div class="add-section">
  <div class="form-card">
    <textarea class="task-input" id="task-input" placeholder="what needs doing?" rows="2"></textarea>
    <div class="form-options">
      <input type="datetime-local" class="datetime-input" id="dt-input" />
      <select class="opt-select" id="priority-select">
        <option value="">priority</option>
        <option value="high">↑ high</option>
        <option value="med">→ medium</option>
        <option value="low">↓ low</option>
      </select>
      <select class="opt-select" id="category-select">
        <option value="">category</option>
        <option value="school">school</option>
        <option value="work">work</option>
        <option value="personal">personal</option>
        <option value="health">health</option>
        <option value="finance">finance</option>
      </select>
      <select class="opt-select" id="recur-select">
        <option value="">repeat</option>
        <option value="daily">daily</option>
        <option value="weekly">weekly</option>
      </select>
    </div>
    <div class="form-footer">
      <div class="time-preview dim" id="time-preview">pick a date & time</div>
      <button class="add-btn" id="add-btn">+ add</button>
    </div>
  </div>
</div>

<div class="tasks-section">
  <div class="section-row">
    <div class="section-label">
      tasks <span class="count-pill" id="pending-count">0</span>
    </div>
  </div>
  <div class="task-list" id="pending-list"></div>
</div>

<div class="done-section" id="done-section" style="display:none">
  <div class="section-row">
    <div class="section-label">done</div>
    <button class="text-btn" id="clear-btn">clear all</button>
  </div>
  <div class="task-list" id="done-list"></div>
</div>

<!-- ALARM -->
<div class="alarm-overlay" id="alarm-overlay">
  <div class="alarm-pulse"></div>
  <div class="alarm-bell">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
  </div>
  <div class="alarm-label">reminder</div>
  <div class="alarm-title" id="alarm-title"></div>
  <div class="alarm-time" id="alarm-time"></div>
  <div class="alarm-btns">
    <button class="alarm-done" id="alarm-done-btn">✓ mark as done</button>
    <div class="alarm-snooze-grid">
      <button class="alarm-snooze-opt" data-mins="5">snooze 5m</button>
      <button class="alarm-snooze-opt" data-mins="15">snooze 15m</button>
      <button class="alarm-snooze-opt" data-mins="30">snooze 30m</button>
      <button class="alarm-snooze-opt" data-mins="60">snooze 1hr</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<footer>@Ebunvisuals 2026</footer>

<script>
// ── THEME ──────────────────────────────────────────
let theme = localStorage.getItem('doit_theme') || 'system';

const sunSVG = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;

const moonSVG = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

const systemSVG = `<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>`;

function applyTheme() {
  const icon = document.getElementById('theme-icon');
  let isDark;
  if (theme === 'system') {
    isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    icon.innerHTML = systemSVG;
  } else if (theme === 'dark') {
    isDark = true;
    icon.innerHTML = moonSVG;
  } else {
    isDark = false;
    icon.innerHTML = sunSVG;
  }
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.querySelector('meta[name="theme-color"]').content = isDark ? '#0a0a0a' : '#f5f4ef';
}

function toggleTheme() {
  theme = theme === 'system' ? 'dark' : theme === 'dark' ? 'light' : 'system';
  localStorage.setItem('doit_theme', theme);
  applyTheme();
  const labels = { system: 'system theme', dark: 'dark mode', light: 'light mode' };
  toast(labels[theme]);
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (theme === 'system') applyTheme();
});

// ── STATE ──────────────────────────────────────────
let tasks = [];
let timers = {};
let alarmTaskId = null;
let alarmSound = null;

function load() {
  try { tasks = JSON.parse(localStorage.getItem('doit_v5') || '[]'); }
  catch { tasks = []; }
}
function save() { localStorage.setItem('doit_v5', JSON.stringify(tasks)); }

// ── CLOCK ──────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const date = now.toLocaleDateString('en-NG', {
    weekday: 'long', day: 'numeric', month: 'short'
  }).toUpperCase();
  const time = now.toLocaleTimeString('en-NG', {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  document.getElementById('today-label').textContent = `${date} · ${time}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── DATETIME ───────────────────────────────────────
const dtInput = document.getElementById('dt-input');
const preview = document.getElementById('time-preview');

function setMinDate() {
  const now = new Date();
  now.setSeconds(0, 0);
  dtInput.min = now.toISOString().slice(0, 16);
}
setMinDate();
setInterval(setMinDate, 60000);

dtInput.addEventListener('change', function () {
  if (!this.value) {
    preview.textContent = 'pick a date & time';
    preview.className = 'time-preview dim';
    return;
  }
  const d = new Date(this.value);
  preview.textContent = '→ ' + d.toLocaleString('en-NG', {
    weekday: 'short', day: 'numeric', month: 'short',
    hour: '2-digit', minute: '2-digit'
  });
  preview.className = 'time-preview';
});

// ── NOTIFICATIONS ──────────────────────────────────
function updateBell() {
  const btn = document.getElementById('bell-btn');
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    btn.classList.add('on');
  } else {
    btn.classList.remove('on');
  }
}

function handleNotif() {
  if (!('Notification' in window)) {
    toast('Not supported on this browser');
    return;
  }
  if (Notification.permission === 'granted') {
    toast('Reminders are on ✓', 'good');
    return;
  }
  Notification.requestPermission().then(p => {
    updateBell();
    if (p === 'granted') {
      toast('Reminders enabled!', 'good');
      scheduleAll();
    } else {
      toast('Blocked — enable in browser settings');
    }
  });
}

// ── SERVICE WORKER ─────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── INPUT ──────────────────────────────────────────
const taskInput = document.getElementById('task-input');

taskInput.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});

taskInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addTask();
  }
});

// ── ADD — using addEventListener not onclick ────────
document.getElementById('add-btn').addEventListener('click', addTask);
document.getElementById('clear-btn').addEventListener('click', clearDone);
document.getElementById('alarm-done-btn').addEventListener('click', alarmDone);

document.querySelectorAll('.alarm-snooze-opt').forEach(btn => {
  btn.addEventListener('click', function() {
    alarmSnooze(parseInt(this.dataset.mins));
  });
});

function addTask() {
  const title    = taskInput.value.trim();
  const dtVal    = dtInput.value;
  const priority = document.getElementById('priority-select').value;
  const category = document.getElementById('category-select').value;
  const recur    = document.getElementById('recur-select').value;

  if (!title)    { toast('Type what needs doing'); taskInput.focus(); return; }
  if (!dtVal)    { toast('Pick a date & time ⏰'); return; }
  if (!priority) { toast('Pick a priority level'); return; }
  if (!category) { toast('Pick a category'); return; }

  const task = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
    title, priority, category,
    recur: recur || null,
    time: new Date(dtVal).toISOString(),
    done: false, fired: false,
    created: Date.now()
  };

  tasks.unshift(task);
  save(); render();
  scheduleOne(task);

  taskInput.value = '';
  taskInput.style.height = 'auto';
  dtInput.value = '';
  document.getElementById('priority-select').value = '';
  document.getElementById('category-select').value = '';
  document.getElementById('recur-select').value = '';
  preview.textContent = 'pick a date & time';
  preview.className = 'time-preview dim';
  taskInput.focus();
  toast('Task added ✓', 'good');
}

// ── SCHEDULE ───────────────────────────────────────
function scheduleAll() {
  Object.values(timers).forEach(clearTimeout);
  timers = {};
  tasks.filter(t => !t.done && t.time && !t.fired).forEach(scheduleOne);
}

function scheduleOne(task) {
  const delay = new Date(task.time) - Date.now();
  if (delay <= 0) return;
  timers[task.id] = setTimeout(() => fireReminder(task.id), delay);
}

function fireReminder(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.done) return;
  task.fired = true;
  save(); render();

  if (Notification.permission === 'granted') {
    try {
      new Notification('DoIt. ⏰', {
        body: task.title,
        tag: task.id,
        vibrate: [200, 100, 200]
      });
    } catch {
      try { new Notification('DoIt.', { body: task.title }); } catch {}
    }
  }

  if (task.recur) {
    const next = new Date(task.time);
    if (task.recur === 'daily')  next.setDate(next.getDate() + 1);
    if (task.recur === 'weekly') next.setDate(next.getDate() + 7);
    const nextTask = {
      ...task,
      id: Date.now().toString(36) + 'r',
      time: next.toISOString(),
      done: false, fired: false,
      created: Date.now()
    };
    tasks.unshift(nextTask);
    save(); render();
    scheduleOne(nextTask);
  }

  showAlarm(task);
}

// ── ALARM ──────────────────────────────────────────
function showAlarm(task) {
  alarmTaskId = task.id;
  document.getElementById('alarm-title').textContent = task.title;
  document.getElementById('alarm-time').textContent = new Date(task.time)
    .toLocaleString('en-NG', {
      weekday: 'long', day: 'numeric', month: 'short',
      hour: '2-digit', minute: '2-digit'
    });
  document.getElementById('alarm-overlay').classList.add('open');
  startAlarmSound();
  if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
}

function closeAlarm() {
  document.getElementById('alarm-overlay').classList.remove('open');
  stopAlarmSound();
  alarmTaskId = null;
}

function alarmDone() {
  if (!alarmTaskId) return;
  const t = tasks.find(t => t.id === alarmTaskId);
  if (t) { t.done = true; save(); render(); }
  closeAlarm();
  toast('Done! ✓', 'good');
}

function alarmSnooze(mins) {
  if (!alarmTaskId) return;
  const t = tasks.find(t => t.id === alarmTaskId);
  if (t) {
    t.time = new Date(Date.now() + mins * 60000).toISOString();
    t.fired = false;
    if (timers[t.id]) clearTimeout(timers[t.id]);
    scheduleOne(t);
    save(); render();
    toast(`Snoozed ${mins} min`, 'warn');
  }
  closeAlarm();
}

function startAlarmSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let step = 0;
    const pattern = [660, 0, 660, 0, 880, 0, 880];

    function beep() {
      if (!alarmTaskId) return;
      const freq = pattern[step % pattern.length];
      if (freq > 0) {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.35, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      }
      step++;
      alarmSound = setTimeout(beep, 480);
    }
    beep();
  } catch(e) {}
}

function stopAlarmSound() {
  if (alarmSound) { clearTimeout(alarmSound); alarmSound = null; }
}

// ── TASK ACTIONS ───────────────────────────────────
function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done && timers[id]) { clearTimeout(timers[id]); delete timers[id]; }
  if (!t.done && t.time && !t.fired) scheduleOne(t);
  save(); render();
}

function deleteTask(id) {
  if (timers[id]) { clearTimeout(timers[id]); delete timers[id]; }
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  save(); render();
  toast('Cleared');
}

// ── RENDER ─────────────────────────────────────────
function render() {
  const pending = tasks.filter(t => !t.done);
  const done    = tasks.filter(t => t.done);

  document.getElementById('pending-count').textContent = pending.length;

  document.getElementById('pending-list').innerHTML = pending.length
    ? pending.map(rowHTML).join('')
    : `<div class="empty-state">
        <div class="empty-glyph">◻</div>
        <div class="empty-text">nothing here yet</div>
        <div class="empty-hint">fill the form above and hit enter</div>
       </div>`;

  document.getElementById('done-list').innerHTML = done.map(rowHTML).join('');
  document.getElementById('done-section').style.display = done.length ? 'block' : 'none';

  // re-attach listeners for dynamic elements
  document.querySelectorAll('.chk').forEach(el => {
    el.addEventListener('click', function() { toggleDone(this.dataset.id); });
  });
  document.querySelectorAll('.act-del').forEach(el => {
    el.addEventListener('click', function() { deleteTask(this.dataset.id); });
  });
  document.querySelectorAll('.act-snz').forEach(el => {
    el.addEventListener('click', function() { openSnooze(this.dataset.id); });
  });
}

function rowHTML(t) {
  const { label, cls } = timeLabel(t);
  const catBadge = t.category ? `<span class="badge">${t.category}</span>` : '';
  const recBadge = t.recur    ? `<span class="badge badge-rec">↺ ${t.recur}</span>` : '';
  const snzBtn   = t.fired && !t.done
    ? `<button class="act-btn act-snz" data-id="${t.id}" title="Snooze">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5-5-5"/></svg>
       </button>` : '';

  return `
    <div class="task-row ${t.done ? 'done' : ''} ${t.priority ? 'pri-'+t.priority : ''} ${t.fired && !t.done ? 'fired' : ''}">
      <div class="chk" data-id="${t.id}"></div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          ${label ? `<span class="task-time ${cls}">◷ ${label}</span>` : ''}
          ${catBadge}${recBadge}
        </div>
      </div>
      <div class="task-actions">
        ${snzBtn}
        <button class="act-btn act-del" data-id="${t.id}" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>`;
}

function openSnooze(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  alarmTaskId = id;
  showAlarm(task);
}

function timeLabel(t) {
  if (!t.time) return { label: '', cls: '' };
  if (t.fired) return { label: 'reminded — snooze?', cls: 'fired' };
  const diff = new Date(t.time) - Date.now();
  if (diff < 0) return { label: 'overdue', cls: 'overdue' };
  const mins = Math.floor(diff / 60000);
  const hrs  = Math.floor(diff / 3600000);
  if (mins < 60) return { label: `in ${mins || 1} min`, cls: 'soon' };
  if (hrs  < 24) return { label: `in ${hrs}h`, cls: hrs < 3 ? 'soon' : '' };
  const d = new Date(t.time);
  return {
    label: d.toLocaleString('en-NG', {
      weekday: 'short', day: 'numeric', month: 'short',
      hour: '2-digit', minute: '2-digit'
    }),
    cls: ''
  };
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── TOAST ──────────────────────────────────────────
let toastT;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show${type ? ' '+type : ''}`;
  clearTimeout(toastT);
  toastT = setTimeout(() => { el.className = 'toast'; }, 2800);
}

// ── INIT ───────────────────────────────────────────
setInterval(render, 30000);
applyTheme();
load();
updateBell();
render();
scheduleAll();
</script>
</body>
</html>
